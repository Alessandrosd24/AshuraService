name: Build Ashura APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK
        run: |
          mkdir -p $HOME/android
          cd $HOME/android
          curl -sL -o cmdline.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q cmdline.zip
          mv cmdline-tools latest 2>/dev/null || true
          export ANDROID_HOME="$HOME/android"
          yes | "$ANDROID_HOME/latest/bin/sdkmanager" --licenses > /dev/null 2>&1 || true
          "$ANDROID_HOME/latest/bin/sdkmanager" "platforms;android-34" "build-tools;34.0.0"
          echo "ANDROID_HOME=$HOME/android" >> $GITHUB_ENV
          echo "$HOME/android/latest/bin" >> $GITHUB_PATH
          echo "sdk.dir=$HOME/android" > $GITHUB_WORKSPACE/local.properties

      - name: Install Gradle
        run: |
          curl -sL -o /tmp/gradle.zip "https://services.gradle.org/distributions/gradle-8.5-bin.zip"
          unzip -q /tmp/gradle.zip -d /opt
          echo "/opt/gradle-8.5/bin" >> $GITHUB_PATH
          gradle --version 2>&1 | head -3

      - name: Build APK
        run: |
          export ANDROID_HOME="$HOME/android"
          gradle assembleDebug --stacktrace 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AshuraAPK
          path: app/build/outputs/apk/debug/*.apk
