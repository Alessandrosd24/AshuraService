name: Build Ashura APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Test Gradle
        run: |
          ./gradlew --version 2>&1 | tee /tmp/gradle-version.log
          echo "VERSION_EXIT=${PIPESTATUS[0]}"
          
      - name: Build APK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls -la $ANDROID_HOME/platforms/ 2>/dev/null || echo "NO PLATFORMS"
          ls -la $ANDROID_HOME/build-tools/ 2>/dev/null || echo "NO BUILD-TOOLS"
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/build.log
          EXIT_CODE=${PIPESTATUS[0]}
          cp /tmp/build.log $GITHUB_WORKSPACE/build-log.txt
          exit $EXIT_CODE

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build-log.txt

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AshuraAPK
          path: app/build/outputs/apk/debug/*.apk
