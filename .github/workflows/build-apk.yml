name: Build Ashura APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK
        run: |
          set -x
          echo "HOME=$HOME"
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          mkdir -p $HOME/android
          cd $HOME/android
          curl -v -o cmdline.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip 2>&1 | head -20
          echo "CURL_EXIT=$?"
          ls -lh cmdline.zip
          unzip -q cmdline.zip
          ls -la
          mv cmdline-tools latest 2>/dev/null || true
          ls latest/bin/ 2>/dev/null || echo "No bin dir"
          export ANDROID_HOME="$HOME/android"
          yes | "$HOME/android/latest/bin/sdkmanager" --licenses 2>&1 | tail -3
          "$HOME/android/latest/bin/sdkmanager" "platforms;android-34" "build-tools;34.0.0" 2>&1 | tail -5
          echo "ANDROID_HOME=$HOME/android" >> $GITHUB_ENV
          echo "$HOME/android/latest/bin" >> $GITHUB_PATH
          echo "sdk.dir=$HOME/android" > $GITHUB_WORKSPACE/local.properties
          echo "SDK setup done!"

      - name: Build
        run: |
          export ANDROID_HOME="$HOME/android"
          # Use gradle wrapper with full output
          chmod +x gradlew
          ./gradlew assembleDebug --full-stacktrace 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AshuraAPK
          path: app/build/outputs/apk/debug/*.apk
