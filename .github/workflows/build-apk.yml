name: Build Ashura APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Install SDK components
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls -la $ANDROID_HOME/
          sdkmanager --list 2>&1 | head -15
          yes | sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>&1
          echo "SDK install done"

      - name: Test Gradle
        run: |
          ./gradlew --version 2>&1 | tee /tmp/gradle-version.log
          echo "VERSION_EXIT=${PIPESTATUS[0]}"

      - name: Build APK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_STEP_SUMMARY
          ls -la $ANDROID_HOME/platforms/ 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "NO PLATFORMS" >> $GITHUB_STEP_SUMMARY
          ls -la $ANDROID_HOME/build-tools/ 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "NO BUILD-TOOLS" >> $GITHUB_STEP_SUMMARY
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/build.log
          EXIT_CODE=${PIPESTATUS[0]}
          cp /tmp/build.log $GITHUB_WORKSPACE/build-log.txt
          # Write full build log to step summary
          echo "## Gradle Build Output (last 80 lines)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -80 /tmp/build.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          # Also try pastebin
          tail -50 /tmp/build.log | curl -s --data-binary @- https://dpaste.org/api/ 2>&1 && echo "dpaste ok" || echo "dpaste failed"
          exit $EXIT_CODE

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build-log.txt

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AshuraAPK
          path: app/build/outputs/apk/debug/*.apk
