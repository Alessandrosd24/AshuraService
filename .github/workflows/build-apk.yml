name: Build Ashura APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        run: |
          # ubuntu-latest incluye Android SDK en $ANDROID_HOME
          echo "ANDROID_HOME=$ANDROID_HOME"

          # Agregar sdkmanager al PATH (múltiples ubicaciones posibles)
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/cmdline-tools/bin:$ANDROID_HOME/tools/bin:$PATH"

          # Aceptar licencias sin interacción
          yes | sdkmanager --licenses > /dev/null 2>&1 || true

          # Instalar plataforma y build-tools requeridos
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

          # Escribir sdk.dir para Gradle
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          cat local.properties

          # Persistir PATH para el siguiente step
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/tools/bin" >> $GITHUB_PATH

      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ashura-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
